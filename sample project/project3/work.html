<body>
    <h1> Number from 1 to 10</h1>
    <input type="value" id="input">
    <button onclick="call()" id="button">check</button>
        <p id="word1">your are Right/wrong!</p>
        <p id="word2">your score:10 </p>

        <script>
            var input = document.getElementById("input")
            var word1 = document.getElementById("word1")
            var word2 = document.getElementById("word2")
            var totalscore = 10

            var randomnumber = Math.floor(Math.random() * 10) + 1;
            function call() {
                var enterednumber = input.value

                if (randomnumber == enterednumber) {
                    console.log("Right")
                    word1.textContent = ("Your are Right")
                    alert("Enjoy buddy you won")
                    
                    


                }
                else {
                    console.log("Wrong")
                    totalscore = totalscore - 1
                    word2.textContent ="score:" + totalscore
                    
                    word1.textContent = (" you are Wrong!")
                }

            }




        </script>
