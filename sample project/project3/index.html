<!DOCTYPE html>

<head>

   <title>Student Form</title>
   <link rel="stylesheet" href="style.css">

</head>

<body>

   <h1>STUDENT DETAILS</h1>


   <form class="box1">
      <div class="group-from1">
         <label>Name: <input type="text" id="id" required></label>
      </div>
      <div class="group-from1"> 
         <label>Age: <input type="number" id="age" required></label>
      </div>

      <div class="group-from1">
         <label>Gender:
            <input type="radio" id="male" name="gender" value="male">Male
            <input type="radio" id="female" name="gender" value="female">Female
         </label>
      </div>
      <div class="group-from1">
         <label>Coures: <input type="text" id="course" required></label>
      </div>
      <div class="group-from1">
         <label>E-mail: <input type="email" id="email" required></label>
      </div>
      <div class="group-from1">
         <label >
            <button>Save</button>
         </label>

      </div>
   </form>


   <table class="box2" border="1" style="border-collapse: collapse";>
       <div class="group-from2">
      <thead>
         <tr>
               <th>Name</th>
               <th>Age</th>
               <th>Gender</th>
