<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <style>
        body {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            text-align: center;
            background-color: gainsboro;
            color: white;
            text-shadow: 2px -2px 5px black;

        }

        #img {
            width: 200px;
            border-radius: 100px;
            border: 10px solid burlywood;

        }
        h2,h4{
            background-color: darkred;
        }

        .header{
            display: flex;
            flex-direction: column;
            align-items: center;
           
        }
        #h2-tag{
            padding: 10px 5px;
            border-radius:10px ;
            margin: 30px 0px 20px ;
        }
        #h4-tag{
            padding: 10px 5px;
            border-radius:10px ;
            margin: 5px 0px;
        }
    </style>
    <div class="header">
        <h1>Today is Hina's birthday 🎂</h1>
        <img src="img.jpeg" id="img">
        <h2 id="h2-tag">20 year old</h2>
        <h4 id="h4-tag">02.06.2007</h4>
    </div>
    <div></div>
</body>

</html>
