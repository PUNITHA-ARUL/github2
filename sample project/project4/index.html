<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booksky</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
<body>
   <div class="navbar">
    <h1>Booksky</h1>
   </div>
  <div class="popup">
    <div class="book-popup" >
        <h2>Rich Dad Poor Dad</h2>
        <h5>Robert</h5>
        <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. A laboriosam praesentium magni omnis, autem accusantium, corrupti rem cupiditate facilis dignissimos expedita quod placeat quidem hic dolorum illum dolore optio. Cumque?</p>
        <button>Delete</button>
    </div>

  </div>
<div class="popup-overlay"></div>
<div class="popup-create">
    <h2>Add Book</h2>
    <form>
        <input type="text" placeholder="Book Title" id="book-title-input">
        <input type="text" placeholder="Book Author" id="book-author-input">
        <textarea placeholder="Short Description" id="book-description"></textarea>
        <button id="add-book">ADD</button>
        <button id="cancel-popup">CANCEL</button>
    </form>

</div>
<button class="add-button" id="add-popup-button">+</button>

    <script src="script.js"></script>
</body>
</html>
