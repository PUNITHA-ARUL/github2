<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"onkeypress="additem()">
    <title>Document</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="Todolist.css">
    
</head>
<body icon="favicon.ico ">
    <h1>Todo List</h1>
    
<input onkeypress="if(event.key==='Enter'){additem()};"  type="text" placeholder="Add a task"   >
<button onclick="additem(),onclick=startItem(event)">Add</button>
<ul id="list">
    <li >Finish the task then
        <button onclick="startItem(event)">click it</button>
    </li>
</ul>

<script>

    var ul = document.getElementById('list');
    var input = document.querySelector('input');
    
    function additem()
    { 
        var startbutton = document.createElement('button')+;
        startbutton.innerHTML ="Start";
        
       var listitem = document.createElement('li');
       listitem.innerHTML = input.value + "<button onclick='deleteItem(event)'>Delete</button>";  
       ul.append(listitem)
       var box= document.querySelector('#list');
       box.insertAdjacentElement('afterbegin', listitem);
       


       
       
    }

    function deleteItem(event)
    {   
        var button = event.target;
        var li = button.parentElement;
        ul.removeChild(li);
    }
    function startItem(event)
    {
        var button = event.target;
        var li = button.parentElement;
        li.style.textDecoration = "line-through";
    }

   

</script>

</body>
</html>
